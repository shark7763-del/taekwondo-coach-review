<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雄麒道館｜教練課程品質管理系統</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root{
  --bg-dark:#080a12; --bg-card:#121726; --bg-card-2:#1a2034; --bg-input:#161c2e;
  --accent:#d4af37; --accent-bright:#f7e08a; --accent-deep:#a8842a; --accent-red:#c8102e; --line-green:#06c755;
  --text:#f5f5f5; --text-dim:#7e889c; --text-mid:#b2bacb; --border:#262d44;
  --green:#22c55e; --orange:#f59e0b; --red:#ef4444; --blue:#3b82f6; --purple:#a78bfa;
}
html,body{ background:var(--bg-dark); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
  min-height:100vh; overscroll-behavior:none; }
body{ background:
  radial-gradient(ellipse 80% 50% at top,rgba(212,175,55,.10) 0%,transparent 55%),
  radial-gradient(ellipse 80% 50% at bottom,rgba(200,16,46,.06) 0%,transparent 55%),var(--bg-dark);
  padding-bottom:70px; }
.app{ max-width:480px; margin:0 auto; }
@media(min-width:481px){ .app{ max-width:720px; } }

/* ====== 首頁 / 登入 ====== */
.overlay{ position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at top,rgba(212,175,55,.12),var(--bg-dark) 70%); padding:24px; }
.home-card{ max-width:400px; width:100%; text-align:center; position:relative; }
.home-logo{ width:74px; height:74px; margin:0 auto 14px; border-radius:50%; font-size:36px;
  background:linear-gradient(135deg,var(--accent-deep),var(--accent-bright)); display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 24px rgba(212,175,55,.45); }
.home-brand{ font-size:12px; letter-spacing:5px; color:var(--accent); font-weight:700; }
.home-title{ font-size:24px; font-weight:900; letter-spacing:2px; margin-top:6px; line-height:1.3; }
.home-sub{ font-size:12px; color:var(--text-dim); margin:12px 0 26px; letter-spacing:1px; line-height:1.8; }
.entry-btn{ display:block; width:100%; padding:22px 20px; margin-bottom:14px; border-radius:18px; cursor:pointer;
  border:1px solid var(--border); text-align:left; transition:.15s; position:relative; overflow:hidden; }
.entry-btn:active{ transform:scale(.98); }
.entry-coach{ background:linear-gradient(135deg,#1a2034,#222a44); border-color:var(--accent); }
.entry-admin{ background:linear-gradient(135deg,var(--accent-red),#7a0a1f); border-color:var(--accent-red); }
.entry-icon{ font-size:30px; }
.entry-name{ font-size:19px; font-weight:900; letter-spacing:1px; margin-top:6px; }
.entry-desc{ font-size:11px; color:var(--text-mid); margin-top:5px; line-height:1.6; }
.entry-admin .entry-desc{ color:#f4c9cf; }
.home-spirit{ margin-top:18px; font-size:11px; letter-spacing:4px; color:var(--accent-deep); }
.back-link{ display:inline-block; margin-top:16px; font-size:12px; color:var(--text-dim); cursor:pointer; }
.name-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
.name-pick{ padding:16px 10px; border:1px solid var(--border); border-radius:13px; background:var(--bg-card-2);
  font-size:15px; font-weight:700; cursor:pointer; transition:.12s; }
.name-pick:active{ transform:scale(.97); border-color:var(--accent); }
.name-pick small{ display:block; font-size:10px; color:var(--text-dim); font-weight:400; margin-top:3px; }

/* ====== 首頁課表預覽 ====== */
#homeScreen{ align-items:flex-start; overflow-y:auto; }
.preview-divider{ height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:20px 0 16px; }
.preview-h{ font-size:13px; font-weight:800; color:var(--accent); letter-spacing:1px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:baseline; }
.preview-h span{ font-size:11px; color:var(--text-dim); font-weight:400; }
.preview-day{ font-size:11px; color:var(--accent-bright); font-weight:700; margin:10px 0 5px; letter-spacing:1px; }
.preview-empty{ font-size:12px; color:var(--text-dim); text-align:center; padding:14px; background:var(--bg-card-2); border:1px solid var(--border); border-radius:12px; line-height:1.7; }
.prow{ display:flex; gap:10px; background:var(--bg-card-2); border:1px solid var(--border); border-radius:11px; padding:9px 11px; margin-bottom:6px; align-items:center; }
.prow.cancelled{ opacity:.5; }
.prow-t{ font-size:12px; font-weight:800; color:var(--accent-bright); text-align:center; line-height:1.35; flex-shrink:0; min-width:42px; }
.prow-c{ font-size:13px; font-weight:800; }
.prow-m{ font-size:11px; color:var(--text-mid); margin-top:3px; line-height:1.6; }

/* ====== 頁首 ====== */
.header{ padding:16px 18px 12px; text-align:center;
  background:linear-gradient(180deg,rgba(212,175,55,.13) 0%,transparent 100%); border-bottom:1px solid var(--border); position:relative; }
.logo{ width:48px; height:48px; margin:0 auto 6px; border-radius:50%; font-size:24px;
  background:linear-gradient(135deg,var(--accent-deep),var(--accent-bright)); display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 18px rgba(212,175,55,.45); }
.brand{ font-size:11px; color:var(--accent); font-weight:700; letter-spacing:3px; }
.title{ font-size:16px; font-weight:800; letter-spacing:1px; margin-top:2px; }
.subtitle{ font-size:11px; color:var(--text-dim); margin-top:3px; letter-spacing:1px; }
.role-switch{ position:absolute; right:12px; top:12px; font-size:11px; padding:6px 10px; border-radius:9px;
  border:1px solid var(--border); background:rgba(0,0,0,.35); color:var(--text-dim); cursor:pointer; }
.role-badge{ display:inline-block; margin-top:8px; font-size:11px; padding:3px 12px; border-radius:12px;
  background:rgba(212,175,55,.15); color:var(--accent); border:1px solid var(--accent); font-weight:600; }

/* ====== 分頁 ====== */
.tab-nav{ position:sticky; top:0; z-index:50; display:flex; overflow-x:auto; background:rgba(10,13,22,.96); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); scrollbar-width:none; }
.tab-nav::-webkit-scrollbar{ display:none; }
.tab-btn{ flex:0 0 auto; min-width:74px; padding:12px 11px; background:transparent; border:none; border-bottom:2px solid transparent;
  color:var(--text-dim); font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:.15s; }
.tab-btn.active{ color:var(--accent); border-bottom-color:var(--accent); background:rgba(212,175,55,.07); }
.tab-panel{ display:none; }
.tab-panel.active{ display:block; animation:fade .25s ease; }
@keyframes fade{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none;} }

/* ====== 區塊 ====== */
.section{ margin:16px; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 4px 18px rgba(0,0,0,.25); }
.section-header{ padding:13px 16px; background:linear-gradient(90deg,rgba(212,175,55,.11) 0%,transparent 100%);
  border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; justify-content:space-between; }
.section-title{ font-size:14px; font-weight:800; letter-spacing:1px; }
.section-body{ padding:14px 16px; }
.section-hint{ font-size:11px; color:var(--text-dim); margin-bottom:12px; line-height:1.7; }

/* ====== 表單 ====== */
.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-grid.full{ grid-template-columns:1fr; }
.form-row{ margin-bottom:12px; }
.form-row:last-child{ margin-bottom:0; }
.form-label{ display:block; font-size:11px; color:var(--accent); font-weight:700; letter-spacing:1px; margin-bottom:5px; }
.form-input,.form-select,.form-textarea{ width:100%; background:var(--bg-input); border:1px solid var(--border); color:var(--text);
  font-size:14px; padding:10px 12px; border-radius:9px; outline:none; font-family:inherit; }
.form-input:focus,.form-select:focus,.form-textarea:focus{ border-color:var(--accent); box-shadow:0 0 0 2px rgba(212,175,55,.16); }
.form-input::placeholder,.form-textarea::placeholder{ color:var(--text-dim); font-size:13px; }
.form-textarea{ min-height:64px; resize:vertical; line-height:1.6; }
.form-select{ appearance:none; -webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23d4af37' d='M0 0l5 6 5-6z'/></svg>");
  background-repeat:no-repeat; background-position:right 12px center; padding-right:30px; }

/* ====== 按鈕 ====== */
.btn{ padding:13px; border:0; border-radius:11px; font-size:13px; font-weight:800; letter-spacing:1px; cursor:pointer; font-family:inherit; transition:transform .15s; }
.btn:active{ transform:scale(.98); }
.btn-primary{ background:linear-gradient(135deg,var(--accent-red),#8a0a1f); color:#fff; box-shadow:0 4px 14px rgba(200,16,46,.3); }
.btn-gold{ background:linear-gradient(135deg,var(--accent),var(--accent-bright)); color:var(--bg-dark); box-shadow:0 4px 14px rgba(212,175,55,.3); }
.btn-secondary{ background:var(--bg-card-2); color:var(--text); border:1px solid var(--border); }
.btn-line{ background:linear-gradient(135deg,var(--line-green),#04a544); color:#fff; box-shadow:0 4px 14px rgba(6,199,85,.3); }
.btn-green{ background:linear-gradient(135deg,var(--green),#16a34a); color:#fff; }
.btn-block{ width:100%; }
.btn-ghost{ background:transparent; border:1px solid var(--border); color:var(--text-mid); }
.btn-red{ background:var(--red); color:#fff; }
.btn-orange{ background:linear-gradient(135deg,var(--orange),#d97706); color:#fff; }
.btn-blue{ background:linear-gradient(135deg,var(--blue),#2563eb); color:#fff; }
.btn-sm{ padding:9px 12px; font-size:12px; letter-spacing:0; }
.btn-xs{ padding:7px 10px; font-size:11px; letter-spacing:0; border-radius:9px; }
.btn-row{ display:flex; gap:8px; flex-wrap:wrap; }
.btn-row .btn{ flex:1; min-width:90px; }
.btns2{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }

/* ====== 卡片 / 排班 ====== */
.card{ background:var(--bg-card-2); border:1px solid var(--border); border-radius:13px; padding:13px; margin-bottom:10px; }
.card.late{ border-left:3px solid var(--orange); }
.card.done{ border-left:3px solid var(--green); }
.card.cancel{ border-left:3px solid var(--red); opacity:.7; }
.card.leave{ border-left:3px solid var(--purple); }
.card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.card-time{ font-size:17px; font-weight:900; color:var(--accent-bright); }
.card-class{ font-size:14px; font-weight:800; margin-top:2px; }
.card-meta{ font-size:11px; color:var(--text-mid); margin-top:5px; line-height:1.7; }
.card-meta b{ color:var(--text); }
.card-actions{ display:flex; flex-wrap:wrap; gap:6px; margin-top:11px; }
.pill{ display:inline-block; font-size:10px; font-weight:800; padding:3px 9px; border-radius:10px; border:1px solid; }
.pill-gold{ background:rgba(212,175,55,.15); color:var(--accent); border-color:var(--accent); }
.pill-green{ background:rgba(34,197,94,.16); color:#86efac; border-color:var(--green); }
.pill-orange{ background:rgba(245,158,11,.16); color:#fcd34d; border-color:var(--orange); }
.pill-red{ background:rgba(239,68,68,.16); color:#fca5a5; border-color:var(--red); }
.pill-purple{ background:rgba(167,139,250,.16); color:#c4b5fd; border-color:var(--purple); }
.pill-blue{ background:rgba(59,130,246,.16); color:#93c5fd; border-color:var(--blue); }
.pill-gray{ background:rgba(126,136,156,.16); color:#cbd5e1; border-color:#475569; }

/* ====== 統計 ====== */
.dash-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.dash-grid.g3{ grid-template-columns:1fr 1fr 1fr; }
.stat{ background:var(--bg-card-2); border:1px solid var(--border); border-radius:12px; padding:14px 8px; text-align:center; }
.stat .num{ font-size:26px; font-weight:900; color:var(--accent); line-height:1; }
.stat .num.warn{ color:var(--red); } .stat .num.good{ color:var(--green); } .stat .num.blue{ color:var(--blue); }
.stat .cap{ font-size:11px; color:var(--text-dim); margin-top:5px; }
.money{ color:var(--accent-bright); font-weight:900; }
.empty{ color:var(--text-dim); text-align:center; padding:24px; font-size:13px; }
.mini{ font-size:12px; color:var(--text-mid); line-height:1.7; }
.month-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.month-head{ font-size:10px; color:var(--accent); text-align:center; font-weight:800; padding:4px 0; }
.month-day{ min-height:86px; background:var(--bg-card-2); border:1px solid var(--border); border-radius:10px; padding:7px 6px; overflow:hidden; }
.month-day.muted{ opacity:.38; }
.month-date{ font-size:11px; font-weight:900; color:var(--accent-bright); margin-bottom:5px; }
.month-item{ font-size:10px; line-height:1.45; padding:5px 0; border-top:1px solid rgba(42,49,73,.65); color:var(--text-mid); cursor:pointer; border-radius:6px; }
.month-item:hover{ background:rgba(212,175,55,.08); }
.month-item b{ color:var(--text); font-size:11px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.month-item.cancelled{ opacity:.55; text-decoration:line-through; }
@media(max-width:520px){
  .month-grid{ gap:4px; }
  .month-day{ min-height:76px; padding:6px 4px; border-radius:8px; }
  .month-item{ font-size:9px; }
}

/* 列表項 */
.list-item{ background:var(--bg-card-2); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:9px; }
.li-top{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
.li-name{ font-weight:800; font-size:14px; }
.li-sub{ font-size:11px; color:var(--text-dim); margin-top:3px; line-height:1.6; }
.li-actions{ display:flex; gap:6px; }
.icon-btn{ width:32px; height:32px; border-radius:9px; border:1px solid var(--border); background:var(--bg-input); color:var(--text-mid);
  font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.icon-btn.del{ color:#fca5a5; }

/* 結算表 */
.settle-row{ background:var(--bg-card-2); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:9px; }
.settle-head{ display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
.settle-net{ font-size:20px; font-weight:900; }
.settle-detail{ display:none; margin-top:10px; border-top:1px dashed var(--border); padding-top:10px; }
.settle-detail.show{ display:block; }
.detail-line{ font-size:11px; color:var(--text-mid); padding:6px 0; border-bottom:1px solid rgba(42,49,73,.5); line-height:1.6; }
.detail-line:last-child{ border-bottom:none; }

/* 復盤 KPI */
.score-row{ padding:9px 0; border-bottom:1px solid rgba(42,49,73,.5); }
.score-row:last-child{ border-bottom:none; }
.score-row-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.score-name{ font-size:13px; }
.score-pill{ font-size:12px; font-weight:800; padding:2px 10px; border-radius:12px; background:var(--bg-input); color:var(--accent);
  border:1px solid var(--border); min-width:38px; text-align:center; }
input[type="range"]{ width:100%; -webkit-appearance:none; appearance:none; background:transparent; height:24px; cursor:pointer; }
input[type="range"]::-webkit-slider-runnable-track{ height:5px; background:var(--bg-dark); border-radius:3px; border:1px solid var(--border); }
input[type="range"]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:21px; height:21px;
  background:linear-gradient(135deg,var(--accent-bright),var(--accent)); border:2px solid var(--bg-dark); border-radius:50%;
  margin-top:-8px; cursor:pointer; box-shadow:0 2px 8px rgba(212,175,55,.5); }
.grade-badge{ width:84px; height:84px; border-radius:50%; background:var(--bg-dark); display:flex; flex-direction:column;
  align-items:center; justify-content:center; border:3px solid var(--accent); flex-shrink:0; box-shadow:0 0 24px rgba(212,175,55,.3); }
.grade-letter{ font-size:34px; font-weight:900; line-height:1; color:var(--accent); }
.grade-pct{ font-size:11px; color:var(--text-mid); margin-top:2px; }
.radar-wrap{ width:100%; max-width:320px; margin:6px auto 0; }
.radar-wrap svg{ width:100%; height:auto; display:block; }

.note{ background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.3); color:#fbbf24; padding:10px 12px; border-radius:10px;
  font-size:12px; line-height:1.6; margin-bottom:12px; }
.note.ok{ background:rgba(34,197,94,.1); border-color:rgba(34,197,94,.3); color:#bbf7d0; }
.result{ background:var(--bg-dark); border:1px solid var(--border); color:var(--text); border-radius:12px; padding:14px 16px;
  white-space:pre-wrap; line-height:1.75; font-size:13px; font-family:"Menlo","Consolas","PingFang TC",monospace; max-height:440px; overflow-y:auto; }

.toast{ position:fixed; top:18px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,var(--accent),var(--accent-bright)); color:var(--bg-dark);
  padding:11px 22px; border-radius:9px; font-size:13px; font-weight:800; box-shadow:0 4px 20px rgba(212,175,55,.4);
  opacity:0; pointer-events:none; transition:opacity .3s,transform .3s; z-index:400; max-width:90%; text-align:center; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(4px); }
.footer-mark{ text-align:center; font-size:11px; color:var(--accent-deep); letter-spacing:3px; padding:8px 16px 24px; }

/* modal */
.modal{ position:fixed; inset:0; z-index:250; display:none; align-items:flex-start; justify-content:center; padding:20px;
  background:rgba(0,0,0,.7); overflow-y:auto; }
.modal.show{ display:flex; }
.modal-card{ background:linear-gradient(160deg,var(--bg-card),var(--bg-card-2)); border:1px solid var(--border); border-radius:18px;
  max-width:440px; width:100%; margin:auto; box-shadow:0 20px 60px rgba(0,0,0,.6); }
.modal-head{ padding:15px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-head h3{ font-size:15px; font-weight:800; letter-spacing:1px; }
.modal-body{ padding:16px 18px; max-height:70vh; overflow-y:auto; }
.modal-foot{ padding:13px 18px; border-top:1px solid var(--border); display:flex; gap:8px; }
.modal-foot .btn{ flex:1; }
.x-btn{ font-size:22px; color:var(--text-dim); cursor:pointer; line-height:1; }
</style>
</head>
<body>

<!-- ====== 首頁 ====== -->
<div class="overlay" id="homeScreen">
  <div class="home-card">
    <div class="home-logo">🥋</div>
    <div class="home-brand">HSIUNG CHI DOJO</div>
    <div class="home-title">雄麒道館<br>教練課程品質管理系統</div>
    <div class="home-sub">排班管理｜課後復盤｜學生追蹤｜品質管理</div>
    <div class="entry-btn entry-coach" onclick="openCoachPick()">
      <div class="entry-icon">🧑‍🏫</div>
      <div class="entry-name">教練 / 助教入口</div>
      <div class="entry-desc">查看我的排班、完成上課、請假代班、查看酬勞</div>
    </div>
    <div class="entry-btn entry-admin" onclick="openAdminLogin()">
      <div class="entry-icon">🛡️</div>
      <div class="entry-name">館長管理後台</div>
      <div class="entry-desc">排班管理、酬勞設定、酬勞結算、資料管理</div>
    </div>
    <div class="home-spirit">以 禮 始 ・ 以 禮 終</div>
    <div id="homePreview" style="text-align:left"></div>
  </div>
</div>

<!-- 選擇教練/助教 -->
<div class="overlay" id="coachPick" style="display:none">
  <div class="home-card">
    <div class="home-logo">🧑‍🏫</div>
    <div class="home-title" style="font-size:20px">請選擇你的姓名</div>
    <div class="home-sub">進入後只會看到你自己的排班與酬勞</div>
    <div class="name-grid" id="coachPickGrid"></div>
    <div class="back-link" onclick="goHome()">← 返回首頁</div>
  </div>
</div>

<!-- 館長密碼 -->
<div class="overlay" id="adminLogin" style="display:none">
  <div class="home-card">
    <div class="home-logo">🛡️</div>
    <div class="home-title" style="font-size:20px">館長管理後台</div>
    <div class="home-sub">請輸入館長密碼</div>
    <input type="password" id="adminPwIn" class="form-input" placeholder="館長密碼" style="text-align:center"
      onkeydown="if(event.key==='Enter')submitAdminPw()">
    <button class="btn btn-primary btn-block" style="margin-top:12px" onclick="submitAdminPw()">進入後台</button>
    <div class="back-link" onclick="goHome()">← 返回首頁</div>
  </div>
</div>

<!-- ====== 主畫面 ====== -->

<script>
/* =========================================================

const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const KEY = 'hcps_db_v1';
const WD = ['週日','週一','週二','週三','週四','週五','週六'];
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function monthStr(d){ d=d||todayStr(); return d.slice(0,7); }
function weekdayOf(dateStr){ return WD[new Date(dateStr+'T00:00:00').getDay()]; }
function fmtMoney(n){ return (n<0?'-':'')+Math.abs(Math.round(n)).toLocaleString(); }
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900); }

/* ---------- 預設資料 ---------- */
function mkClass(name,start,end,assist){ return { id:uid(), name, start, end, mainCoach:'', assistantCount:assist, note:'' }; }
function defaultDB(){

/* ---------- 資料存取 ---------- */
let DB = load();
function load(){
  try{ const raw=localStorage.getItem(KEY); if(raw){ const d=JSON.parse(raw); return Object.assign(defaultDB(), d); } }catch(e){}
  return defaultDB();
}
function save(){
  DB._updatedAt=Date.now();
  localStorage.setItem(KEY, JSON.stringify(DB));
  queueCloudSave();
}
const CLOUD_ON = typeof google!=='undefined' && google.script && google.script.run;
let cloudSaveTimer=null, cloudBooted=false;
function queueCloudSave(){
  if(!CLOUD_ON || !cloudBooted) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer=setTimeout(()=>saveCloudNow(),650);
}
function saveCloudNow(){
  if(!CLOUD_ON) return;
  google.script.run
    .withFailureHandler(()=>toast('已存本機，雲端同步失敗'))
    .saveFullDbSrv(JSON.stringify({updatedAt:DB._updatedAt||Date.now(), db:DB}));
}
function initCloudSync(){
  if(!CLOUD_ON) return;
  google.script.run
    .withSuccessHandler(raw=>{
      cloudBooted=true;
      try{
        const payload=JSON.parse(raw||'{}');
        const localAt=DB._updatedAt||0;
        if(payload.db && (payload.updatedAt||0)>localAt){
          DB=Object.assign(defaultDB(), payload.db);
          localStorage.setItem(KEY, JSON.stringify(DB));
          toast('☁️ 已載入雲端資料');
          goHome();
        }else if(!payload.db){
          saveCloudNow();
          toast('☁️ 已建立雲端同步');
        }else{
          toast('☁️ 雲端同步已啟用');
        }
      }catch(e){ toast('雲端資料讀取失敗，先使用本機資料'); }
    })
    .withFailureHandler(()=>{ cloudBooted=false; toast('雲端連線失敗，先使用本機資料'); })
    .getFullDbSrv();
}

/* 酬勞身分 / 狀態 */
const PAY_ROLES = ['主教練','次教練','助教','獨立帶課','不計酬'];
const SCH_STATUS = ['已排班','已上課','請假','代班','遲到','取消'];
const SCHEDULE_TYPES = ['一般上課','帶隊參賽','移地訓練','活動協助','晉級測驗'];
function payBase(payRole){
  const s = DB.salarySettings.find(x=>x.payKey===payRole && x.type==='固定酬勞' && x.active);
  if(s) return s.amount;
  return 0;
}
function setVal(key){ const s=DB.salarySettings.find(x=>x.payKey===key && x.active); return s? s.amount:0; }
function lateAmt(){ return setVal('late'); }
function subAmt(){ return setVal('sub'); }
function activePeople(){ return DB.people.filter(p=>p.active); }
function personByName(n){ return DB.people.find(p=>p.name===n); }

/* =========================================================
   首頁 / 登入
========================================================= */
let MODE=null, CURRENT_PERSON=null, CURRENT_TAB=null;
function goHome(){
  $('#appWrap').style.display='none';
  ['coachPick','adminLogin'].forEach(id=>$('#'+id).style.display='none');
  $('#homeScreen').style.display='flex';
  MODE=null; CURRENT_PERSON=null;
  renderHomePreview();
}
function publicRow(s){
  const assist=[s.a1,s.a2,s.a3].filter(Boolean).join('、')||'—';
  const cancelled=s.status==='取消';
  return `<div class="prow${cancelled?' cancelled':''}">
    <div class="prow-t">${esc(s.start)}<br>${esc(s.end)}</div>
    <div style="flex:1;min-width:0">
      <div class="prow-c">${esc(s.className)}${cancelled?' <span class="pill pill-red">取消</span>':''}</div>
      <div class="prow-m">👤 主：<b>${esc(s.mainCoach||'—')}</b>｜助：${esc(assist)}</div>
    </div>
  </div>`;
}
function renderHomePreview(){
  const el=$('#homePreview'); if(!el) return;
  const t=todayStr();
  const todayList=DB.schedules.filter(s=>s.date===t).sort((a,b)=>a.start.localeCompare(b.start));
  const {start,end,days}=weekRange();
  let html='<div class="preview-divider"></div>';
  html+=`<div class="preview-h">📅 今日課表 <span>${t.slice(5)}（${weekdayOf(t)}）</span></div>`;
  html+= todayList.length? todayList.map(publicRow).join('') : '<div class="preview-empty">今日尚無排班</div>';
  html+=`<div class="preview-h" style="margin-top:16px">🗓️ 本週課表 <span>${start.slice(5)} ~ ${end.slice(5)}</span></div>`;
  let any=false, wk='';
  days.forEach(d=>{ const list=DB.schedules.filter(s=>s.date===d).sort((a,b)=>a.start.localeCompare(b.start)); if(!list.length) return; any=true;
    wk+=`<div class="preview-day">${weekdayOf(d)}　${d.slice(5)}</div>`+list.map(publicRow).join(''); });
  html+= any? wk : '<div class="preview-empty">本週尚無排班<br>請館長進後台「排班管理」新增，或用「固定週課表」一鍵產生本週</div>';
  el.innerHTML=html;
}
function openCoachPick(){
  $('#homeScreen').style.display='none';
  $('#coachPickGrid').innerHTML = activePeople().map(p=>
    `<div class="name-pick" onclick="enterCoach('${esc(p.name)}')">${esc(p.name)}<small>${esc(p.role)}</small></div>`).join('')

function openAdminLogin(){

  $('#adminPwIn').value='';
  $('#adminLogin').style.display='flex';

}
function submitAdminPw(){

  else { toast('密碼錯誤'); $('#adminPwIn').value=''; }
}
function enterCoach(name){ MODE='coach'; CURRENT_PERSON=name; $('#coachPick').style.display='none'; startApp(); }
function enterAdmin(){ MODE='admin'; CURRENT_PERSON=null; $('#adminLogin').style.display='none'; startApp(); }

/* =========================================================
   分頁
========================================================= */
const COACH_TABS=[
  {id:'c-today', label:'今日排班', icon:'📅'},
  {id:'c-week',  label:'本週排班', icon:'🗓️'},
  {id:'c-leave', label:'請假/代班', icon:'🔁'},
  {id:'c-review',label:'課後復盤', icon:'📝'},
  {id:'c-salary',label:'我的酬勞', icon:'💰'},
];
const ADMIN_TABS=[
  {id:'a-dash',   label:'今日總覽', icon:'🏠'},
  {id:'a-sched',  label:'排班管理', icon:'📋'},
  {id:'a-month',  label:'月班表', icon:'📆'},
  {id:'a-weekly', label:'固定週課表', icon:'🗓️'},
  {id:'a-people', label:'教練名單', icon:'🧑‍🏫'},
  {id:'a-class',  label:'班別設定', icon:'🏷️'},
  {id:'a-pay',    label:'酬勞設定', icon:'⚙️'},
  {id:'a-records',label:'上課紀錄', icon:'📒'},
  {id:'a-coach-eval',label:'教練考核', icon:'🎯'},
  {id:'a-settle', label:'酬勞結算', icon:'🧮'},
  {id:'a-line',   label:'LINE回報', icon:'💬'},
  {id:'a-data',   label:'資料管理', icon:'💾'},
];
const ROLE_PERMISSIONS={
  '館長':{
    tabs:ADMIN_TABS.map(t=>t.id),
    actions:['viewSalaryTotal','manageSchedule','deleteSchedule','manageWeekly','confirmLeave','confirmSub','managePeople','manageClasses','managePay','manageRecords','viewCoachEval','settleSalary','lineSalary','manageData']
  },
  '主教練':{
    tabs:['a-dash','a-sched','a-month','a-weekly','a-coach-eval','a-line'],
    actions:['manageSchedule','manageWeekly','confirmLeave','viewCoachEval']
  },
  '次教練':{
    tabs:['a-dash'],
    actions:[]
  },
  '助教':{
    tabs:[],
    actions:[]
  }
};
function currentRole(){ return MODE==='admin' ? '館長' : (personByName(CURRENT_PERSON)?.role || '助教'); }
function rolePerm(){ return ROLE_PERMISSIONS[currentRole()] || ROLE_PERMISSIONS['助教']; }
function hasPerm(action){ return currentRole()==='館長' || rolePerm().actions.includes(action); }
function requirePerm(action, msg){ if(hasPerm(action)) return true; toast(msg||'此功能限授權管理者使用'); return false; }
function tabsForCurrentUser(){
  if(MODE==='admin') return ADMIN_TABS;
  const allowed=new Set(rolePerm().tabs);
  return [...COACH_TABS, ...ADMIN_TABS.filter(t=>allowed.has(t.id))];
}
function startApp(){
  $('#appWrap').style.display='block';
  const tabs = tabsForCurrentUser();
  $('#roleBadge').textContent = MODE==='coach'
    ? `${CURRENT_PERSON}（${currentRole()}）｜${rolePerm().tabs.length?'授權後台':'個人模式'}`
    : '館長模式｜完整後台';
  $('#tabNav').innerHTML = tabs.map((t,i)=>
    `<button class="tab-btn${i===0?' active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.icon} ${t.label}</button>`).join('');
  $('#panels').innerHTML = tabs.map(t=>`<div class="tab-panel" id="panel-${t.id}"></div>`).join('');
  switchTab(tabs[0].id);
  window.scrollTo(0,0);
}
function switchTab(id){
  const tabs=tabsForCurrentUser();
  if(!tabs.some(t=>t.id===id)){ toast('沒有權限開啟此分頁'); id=tabs[0].id; }
  CURRENT_TAB=id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===id));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  $('#panel-'+id).classList.add('active');
  renderTab(id);
  window.scrollTo(0,0);
}
function renderTab(id){
  ({
    'c-today':renderCoachToday, 'c-week':renderCoachWeek, 'c-leave':renderCoachLeave,
    'c-review':renderReview, 'c-salary':renderCoachSalary,
    'a-dash':renderDash, 'a-sched':renderSched, 'a-month':renderMonthSchedule, 'a-weekly':renderWeekly, 'a-people':renderPeople,
    'a-class':renderClasses, 'a-pay':renderPay, 'a-records':renderRecords, 'a-coach-eval':renderCoachEval, 'a-settle':renderSettle,
    'a-line':renderLine, 'a-data':renderData,
  }[id]||(()=>{}))();
}

/* =========================================================
   排班 entries：主教練 + 助教，各自一筆出席
========================================================= */
function buildEntries(s){
  const arr=[];
  if(s.mainCoach) arr.push({ person:s.mainCoach, slot:'主教練', payRole:s.payRole||'主教練' });
  [s.a1,s.a2,s.a3].forEach((a,i)=>{ if(a) arr.push({ person:a, slot:'助教'+(i+1), payRole:'助教' }); });
  return arr;
}
function ensureEntries(s){
  if(!s.entries){
    s.entries = buildEntries(s).map(e=>Object.assign(e,{ status:s.status||'已排班', late:false, isSub:false, subExtra:false, completed:false, salaryId:null }));
  }
  return s.entries;
}
function myEntry(s){ ensureEntries(s); return s.entries.find(e=>e.person===CURRENT_PERSON); }

function completeEntry(schedId, person){
  const s=DB.schedules.find(x=>x.id===schedId); if(!s) return;
  const e=s.entries.find(x=>x.person===person); if(!e) return;
  if(e.completed){ toast('已完成過此堂課'); return; }
  if(s.status==='取消'){ toast('此堂課已取消'); return; }
  e.completed=true; e.status='已上課';
  const base=payBase(e.payRole);
  const bonus=e.isSub && e.subExtra ? subAmt() : 0;
  const deduct=e.late ? lateAmt() : 0;
  const rec={ id:uid(), scheduleId:s.id, date:s.date, month:monthStr(s.date), className:s.className,
    personName:person, role:e.payRole, base, bonus, deduct, net:base+bonus-deduct,
    status:'未結算', note:(e.late?'遲到 ':'')+(e.isSub?'代班 ':''), paid:false };
  e.salaryId=rec.id; DB.salaryRecords.push(rec);
  if(e.slot==='主教練') s.status=e.late?'遲到':'已上課';
  save(); toast('✅ 已完成上課，本堂實領 $'+fmtMoney(rec.net)); renderTab(CURRENT_TAB);
}
function toggleLate(schedId, person){
  const s=DB.schedules.find(x=>x.id===schedId); const e=s.entries.find(x=>x.person===person);
  e.late=!e.late;
  if(e.salaryId){ const r=DB.salaryRecords.find(x=>x.id===e.salaryId); if(r){ r.deduct=e.late?lateAmt():0; r.net=r.base+r.bonus-r.deduct; r.note=(e.late?'遲到 ':'')+(e.isSub?'代班 ':''); } }
  save(); toast(e.late?'已標記遲到（扣 $'+fmtMoney(lateAmt())+'）':'已取消遲到'); renderTab(CURRENT_TAB);
}

/* =========================================================
   教練端：今日 / 本週
========================================================= */
function schedulesOfPerson(person, dateFilter){
  return DB.schedules.filter(s=>{ ensureEntries(s);
    if(dateFilter && s.date!==dateFilter) return false;
    return s.entries.some(e=>e.person===person);
  }).sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start));
}
function statusPill(status){
  const map={'已排班':'pill-gray','已上課':'pill-green','請假':'pill-purple','代班':'pill-blue','遲到':'pill-orange','取消':'pill-red'};
  return `<span class="pill ${map[status]||'pill-gray'}">${esc(status)}</span>`;
}
function coachSchedCard(s, interactive){
  const e=myEntry(s);
  const cls = s.status==='取消'?'cancel': e.completed?'done': e.late?'late':'';
  const assist=[s.a1,s.a2,s.a3].filter(Boolean).join('、')||'—';
  const type=s.courseType||'一般上課';
  let actions='';
  if(interactive){
    if(s.status==='取消'){ actions=`<span class="pill pill-red">本堂已取消</span>`; }
    else if(e.completed){
      actions=`<span class="pill pill-green">✅ 已完成</span>${e.late?'<span class="pill pill-orange">遲到</span>':''}${e.isSub?'<span class="pill pill-blue">代班</span>':''}
        <button class="btn btn-secondary btn-xs" onclick="gotoReviewFor('${s.id}')">📝 填復盤</button>`;
    } else {
      actions=`
        <button class="btn btn-green btn-xs" onclick="completeEntry('${s.id}','${esc(CURRENT_PERSON)}')">✅ 完成上課</button>
        <button class="btn btn-orange btn-xs" onclick="toggleLate('${s.id}','${esc(CURRENT_PERSON)}')">${e.late?'⏰ 已遲到':'⏰ 遲到註記'}</button>
        <button class="btn btn-secondary btn-xs" onclick="openLeaveModal('${s.id}')">🙋 請假</button>
        <button class="btn btn-secondary btn-xs" onclick="openSubModal('${s.id}')">🔁 代班</button>
        <button class="btn btn-secondary btn-xs" onclick="gotoReviewFor('${s.id}')">📝 復盤</button>`;
    }
  }
  return `<div class="card ${cls}">
    <div class="card-top">
      <div><div class="card-time">${esc(s.start)}–${esc(s.end)}</div><div class="card-class">${esc(s.className)} ${type!=='一般上課'?`<span class="pill pill-blue">${esc(type)}</span>`:''}</div></div>
      <div style="text-align:right">${statusPill(e.completed?'已上課':s.status)}<div class="card-meta">${esc(e.payRole)}｜基本 $${fmtMoney(payBase(e.payRole))}</div></div>
    </div>
    <div class="card-meta">📅 ${esc(s.date)}（${esc(s.weekday)}）｜主教練：<b>${esc(s.mainCoach||'—')}</b>｜助教：${esc(assist)}<br>📖 ${esc(s.content||'—')}${s.note?'｜備註：'+esc(s.note):''}</div>
    ${actions?`<div class="card-actions">${actions}</div>`:''}
  </div>`;
}
function renderCoachToday(){
  const t=todayStr();
  const list=schedulesOfPerson(CURRENT_PERSON, t);
  const done=list.filter(s=>myEntry(s).completed).length;
  const money=list.filter(s=>myEntry(s).completed).reduce((a,s)=>{const r=DB.salaryRecords.find(x=>x.id===myEntry(s).salaryId);return a+(r?r.net:0);},0);
  $('#panel-c-today').innerHTML=`
  <div class="section"><div class="section-header"><div class="section-title">📅 ${esc(CURRENT_PERSON)}的今日排班</div><span class="mini">${t}（${weekdayOf(t)}）</span></div>
    <div class="section-body"><div class="dash-grid g3">
      <div class="stat"><div class="num">${list.length}</div><div class="cap">今日堂數</div></div>
      <div class="stat"><div class="num good">${done}</div><div class="cap">已完成</div></div>
      <div class="stat"><div class="num blue">$${fmtMoney(money)}</div><div class="cap">今日酬勞</div></div>
    </div></div>
  </div>
  <div style="margin:0 16px">${ list.length? list.map(s=>coachSchedCard(s,true)).join('') : '<div class="empty">今日沒有你的排班 🌙</div>' }</div>`;
}
function weekRange(){
  const now=new Date(); const day=now.getDay(); const diff=(day===0?-6:1-day);
  const mon=new Date(now); mon.setDate(now.getDate()+diff);
  const days=[]; for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i);
    days.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')); }
  return { start:days[0], end:days[6], days };
}
function renderCoachWeek(){
  const {start,end,days}=weekRange();
  let html=`<div class="section"><div class="section-header"><div class="section-title">🗓️ ${esc(CURRENT_PERSON)}的本週排班</div><span class="mini">${start.slice(5)} ~ ${end.slice(5)}</span></div><div class="section-body section-hint">顯示本週（週一～週日）你被排到的所有課程。</div></div>`;
  let any=false;
  days.forEach(d=>{ const list=schedulesOfPerson(CURRENT_PERSON, d); if(!list.length) return; any=true;
    html+=`<div class="section"><div class="section-header"><div class="section-title">${weekdayOf(d)}　${d.slice(5)}</div></div>
      <div class="section-body" style="padding-top:6px">${list.map(s=>coachSchedCard(s,d===todayStr())).join('')}</div></div>`; });
  if(!any) html+='<div class="empty">本週沒有你的排班</div>';
  $('#panel-c-week').innerHTML=html;
}

function calcReview(){
  const avg=reviewState.scores.reduce((a,b)=>a+b,0)/6;
  const quickAvg=Object.values(reviewState.quick).reduce((a,b)=>a+b,0)/5;
  const selfAvg=Object.values(reviewState.self).reduce((a,b)=>a+b,0)/4;
  const total=quickAvg*0.45 + avg*0.30 + reviewState.quality*0.15 + selfAvg*0.10;
  const pct=Math.round(total/5*100);
  let g='D'; if(total>=4.5)g='S'; else if(total>=4)g='A'; else if(total>=3.5)g='B'; else if(total>=2.5)g='C';
  $('#rv_total').textContent=total.toFixed(1); $('#rv_grade').textContent=g; $('#rv_pct').textContent=pct+'%';
  const max=SIX[reviewState.scores.indexOf(Math.max(...reviewState.scores))];
  const min=SIX[reviewState.scores.indexOf(Math.min(...reviewState.scores))];
  $('#rv_words').innerHTML=`等級 <b style="color:var(--accent)">${g}</b>｜快速平均：${quickAvg.toFixed(1)}｜強項：${max}｜待加強：${min}｜自評：${selfAvg.toFixed(1)}`;
  drawRadar();
}
function drawRadar(){
  const svg=$('#rv_radar'); if(!svg) return;
  const cx=160,cy=150,R=100,N=6;
  const pt=(i,r)=>{ const a=-Math.PI/2 + i*2*Math.PI/N; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
  let g='';
  for(let ring=1;ring<=4;ring++){ const r=R*ring/4; let pts=''; for(let i=0;i<N;i++){const[x,y]=pt(i,r);pts+=x+','+y+' ';} g+=`<polygon points="${pts}" fill="none" stroke="#262d44" stroke-width="1"/>`; }
  for(let i=0;i<N;i++){ const[x,y]=pt(i,R); g+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#262d44" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+24); g+=`<text x="${lx}" y="${ly}" fill="#b2bacb" font-size="11" text-anchor="middle" dominant-baseline="middle">${SIX[i]}</text>`; }
  let pts=''; for(let i=0;i<N;i++){ const[x,y]=pt(i,R*reviewState.scores[i]/5); pts+=x+','+y+' '; }
  g+=`<polygon points="${pts}" fill="rgba(212,175,55,.28)" stroke="#d4af37" stroke-width="2"/>`;
  svg.innerHTML=g;
}

function splitWords(text){
  return String(text||'').split(/[，,、\n\s/]+/).map(s=>s.trim()).filter(Boolean);
}
function aiStudentHighlights(studentTracks){
  const valid=studentTracks.filter(s=>s.studentName);
  const progress=valid.find(s=>s.performance==='優秀')
    || valid.find(s=>s.performance==='穩定' && (s.techIssue||s.focusIssue||s.attitudeIssue||s.note))
    || valid[0];
  const encourage=valid.find(s=>s.performance==='需提醒'||s.notifyParent)
    || valid.find(s=>s.focusIssue||s.attitudeIssue||s.techIssue)
    || valid.find(s=>s.performance==='普通');
  return {progress, encourage};
}
function aiIssueText(track){
  if(!track) return '';
  return [track.techIssue,track.attitudeIssue,track.focusIssue,track.nextReminder,track.note].filter(Boolean).join('、');
}

function courseReviewStats(){
  const today=todayStr();
  const {days}=weekRange();
  const reviews=DB.reviews||[];
  const todayReviews=reviews.filter(r=>r.date===today);
  const weekReviews=reviews.filter(r=>days.includes(r.date));
  const weekLessons=(DB.schedules||[]).filter(s=>days.includes(s.date)&&s.status!=='取消');
  const byCoach={}; reviews.forEach(r=>{ byCoach[r.coach]=(byCoach[r.coach]||0)+1; });
  const byClass={}; reviews.forEach(r=>{ (byClass[r.className]=byClass[r.className]||[]).push(+r.total||0); });
  const problemText=reviews.flatMap(r=>[r.worst,r.evidence,r.special].filter(Boolean).join(' ').split(/[，,、\s]+/)).filter(x=>x&&x.length>1);
  const problems={}; problemText.forEach(w=>{ problems[w]=(problems[w]||0)+1; });
  const concern=(DB.studentRecords||[]).filter(r=>r.needAttention||r.performance==='需提醒'||r.notifyParent||r.techIssue||r.attitudeIssue||r.focusIssue).slice(-8).reverse();
  const reviewedKeys=new Set(reviews.map(r=>`${r.date}|${r.className}|${r.coach}`));
  const missing=weekLessons.filter(s=>s.mainCoach&&!reviewedKeys.has(`${s.date}|${s.className}|${s.mainCoach}`));
  return {todayReviews,weekReviews,weekLessons,byCoach,byClass,problems,concern,missing};
}

let schedFilterDate='';

function timeOverlap(aStart,aEnd,bStart,bEnd){ return aStart < bEnd && bStart < aEnd; }
function scheduleIssues(obj, excludeId){
  const issues=[];
  const assigned=[obj.mainCoach,obj.a1,obj.a2,obj.a3].filter(Boolean);
  const dup=assigned.find((p,i)=>assigned.indexOf(p)!==i);
  const klass=DB.classes.find(c=>c.name===obj.className);
  const assistCount=[obj.a1,obj.a2,obj.a3].filter(Boolean).length;
  if(!obj.mainCoach) issues.push('缺少主教練');
  if(dup) issues.push(`${dup} 在同一堂課被重複安排`);
  if(klass && assistCount < (+klass.assistantCount||0)) issues.push(`${obj.className} 預設需要 ${klass.assistantCount} 位助教，目前只有 ${assistCount} 位`);
  assigned.forEach(name=>{ const p=personByName(name); if(p && !p.active) issues.push(`${name} 已停用，不應排班`); });
  DB.schedules.forEach(s=>{
    if(s.id===excludeId || s.date!==obj.date || s.status==='取消') return;
    const others=[s.mainCoach,s.a1,s.a2,s.a3].filter(Boolean);
    assigned.forEach(name=>{
      if(others.includes(name) && timeOverlap(obj.start,obj.end,s.start,s.end)){
        issues.push(`${name} 與 ${s.start}-${s.end} ${s.className} 撞班`);
      }
    });
  });
  return [...new Set(issues)];
}

function shiftMonth(delta){
  if(!monthScheduleMonth) monthScheduleMonth=monthStr();
  const d=new Date(monthScheduleMonth+'-01T00:00:00');
  d.setMonth(d.getMonth()+delta);
  monthScheduleMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  renderMonthSchedule();
}
function monthCalendarDays(ym){
  const first=new Date(ym+'-01T00:00:00');
  const start=new Date(first);
  start.setDate(first.getDate()-first.getDay());
  const days=[];
  for(let i=0;i<42;i++){
    const d=new Date(start);
    d.setDate(start.getDate()+i);
    days.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
  }
  return days;
}
function datesInMonth(ym){
  const first=new Date(ym+'-01T00:00:00');
  const days=[];
  const d=new Date(first);
  while(d.getMonth()===first.getMonth()){
    days.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
    d.setDate(d.getDate()+1);
  }
  return days;
}

function genWeekFromTemplate(){
  if(!requirePerm('manageWeekly','只有館長或主教練可以產生週排班')) return;
  const actives=DB.weeklyTemplates.filter(t=>t.active);
  if(!actives.length){ toast('尚無啟用的固定週課表'); return; }
  confirmBox('將依固定週課表為本週產生排班（已存在的同日同班別同時段會略過）。',()=>{
    const {days}=weekRange(); let added=0;
    actives.forEach(t=>{
      const wdIdx=['週日','週一','週二','週三','週四','週五','週六'].indexOf(t.weekday);
      const date=days.find(d=>new Date(d+'T00:00:00').getDay()===wdIdx);
      if(!date) return;
      if(DB.schedules.some(s=>s.date===date&&s.className===t.className&&s.start===t.start)) return;
      const obj={ id:uid(), date, weekday:t.weekday, className:t.className, start:t.start, end:t.end,
        mainCoach:t.mainCoach, a1:t.a1, a2:t.a2, a3:t.a3, content:t.content,
        courseType:'一般上課', payRole:'主教練', status:'已排班', note:'(週課表產生)', temp:false };
      ensureEntries(obj); DB.schedules.push(obj); added++;
    });
    save(); toast(`已產生 ${added} 筆本週排班`); switchTab('a-sched');
  });
}
function genMonthFromTemplate(){
  if(!requirePerm('manageWeekly','只有館長或主教練可以產生月排班')) return;
  if(!monthScheduleMonth) monthScheduleMonth=monthStr();
  const actives=DB.weeklyTemplates.filter(t=>t.active);
  if(!actives.length){ toast('尚無啟用的固定週課表'); return; }
  confirmBox(`將依固定週課表產生 ${monthScheduleMonth} 整月排班（已存在的同日同班別同時段會略過）。`,()=>{
    const days=datesInMonth(monthScheduleMonth);
    let added=0, skipped=0;
    days.forEach(date=>{
      const wd=weekdayOf(date);
      actives.filter(t=>t.weekday===wd).forEach(t=>{
        if(DB.schedules.some(s=>s.date===date&&s.className===t.className&&s.start===t.start)){
          skipped++;
          return;
        }
        const obj={ id:uid(), date, weekday:wd, className:t.className, start:t.start, end:t.end,
          mainCoach:t.mainCoach, a1:t.a1, a2:t.a2, a3:t.a3, content:t.content,
          courseType:'一般上課', payRole:'主教練', status:'已排班', note:'(月班表產生)', temp:false };
        ensureEntries(obj); DB.schedules.push(obj); added++;
      });
    });
    save();
    toast(`已產生 ${added} 筆本月排班${skipped?`，略過 ${skipped} 筆重複`:''}`);
    renderMonthSchedule();
  });
}

let settleMonth='';
function renderSettle(){
  if(!requirePerm('settleSalary','酬勞結算限館長使用')) return;
  if(!settleMonth) settleMonth=monthStr();
  const recs=DB.salaryRecords.filter(r=>r.month===settleMonth);
  const byPerson={}; recs.forEach(r=>{ (byPerson[r.personName]=byPerson[r.personName]||[]).push(r); });
  const monthSubs=DB.substituteRecords.filter(s=>monthStr(s.date)===settleMonth);
  const monthLeaves=DB.leaveRequests.filter(l=>monthStr(l.date)===settleMonth);
  const names=Object.keys(byPerson);
  const grand=recs.reduce((a,r)=>a+r.net,0);
  $('#panel-a-settle').innerHTML=`
  <div class="section"><div class="section-header"><div class="section-title">🧮 酬勞結算</div></div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-row"><label class="form-label">月份</label><input type="month" class="form-input" value="${settleMonth}" onchange="settleMonth=this.value;renderSettle()"></div>
        <div class="form-row"><label class="form-label">本月總額</label><input class="form-input" value="$${fmtMoney(grand)}" readonly></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary btn-sm" onclick="exportSalaryCSV()">📄 匯出本月 CSV</button>
        <button class="btn btn-line btn-sm" onclick="lineSalaryReport()">💬 LINE 酬勞回報</button>
      </div>
    </div>
  </div>
  <div style="margin:0 16px">${ names.length? names.map(n=>settleCard(n,byPerson[n],monthSubs,monthLeaves)).join('') : '<div class="empty">本月尚無酬勞紀錄</div>' }</div>`;
}
function personSummary(name, recs, subs, leaves){
  const cnt=role=>recs.filter(r=>r.role===role).length;
  return { lessons:recs.length, main:cnt('主教練'), second:cnt('次教練'), assist:cnt('助教'), solo:cnt('獨立帶課'),
    sub:subs.filter(s=>s.subCoach===name).length, late:recs.filter(r=>r.deduct>0).length,
    leave:leaves.filter(l=>l.originPerson===name).length,
    base:recs.reduce((a,r)=>a+r.base,0), bonus:recs.reduce((a,r)=>a+r.bonus,0),
    deduct:recs.reduce((a,r)=>a+r.deduct,0), net:recs.reduce((a,r)=>a+r.net,0),
    paid:recs.length>0 && recs.every(r=>r.paid) };
}
function settleCard(name, recs, subs, leaves){
  const s=personSummary(name,recs,subs,leaves);
  return `<div class="settle-row">
    <div class="settle-head" onclick="this.parentNode.querySelector('.settle-detail').classList.toggle('show')">
      <div><div class="li-name">${esc(name)} ${s.paid?'<span class="pill pill-green">已付款</span>':'<span class="pill pill-orange">未付款</span>'}</div>
        <div class="li-sub">上課 ${s.lessons}（主${s.main}/次${s.second}/助${s.assist}/獨${s.solo}）｜代${s.sub}｜遲${s.late}｜假${s.leave}</div></div>
      <div class="settle-net money">$${fmtMoney(s.net)}</div>
    </div>
    <div class="settle-detail">
      <div class="li-sub" style="margin-bottom:8px">原始 $${fmtMoney(s.base)}｜加給 +$${fmtMoney(s.bonus)}｜扣款 -$${fmtMoney(s.deduct)}｜實領 <b class="money">$${fmtMoney(s.net)}</b></div>
      ${recs.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(r=>`<div class="detail-line">${esc(r.date)}｜${esc(r.className)}｜${esc(r.role)}｜原 $${fmtMoney(r.base)} +$${fmtMoney(r.bonus)} -$${fmtMoney(r.deduct)} = <b class="money">$${fmtMoney(r.net)}</b>｜${esc(r.status)}${r.note?'｜'+esc(r.note):''}</div>`).join('')}
      <div class="btn-row" style="margin-top:10px">
        <button class="btn btn-blue btn-xs" onclick="markPerson('${esc(name)}','已結算')">標記已結算</button>
        <button class="btn btn-green btn-xs" onclick="markPerson('${esc(name)}','已付款')">標記已付款</button>
      </div>
    </div>
  </div>`;
}
function markPerson(name, status){
  if(!requirePerm('settleSalary','酬勞結算狀態限館長更新')) return;
  DB.salaryRecords.filter(r=>r.personName===name && r.month===settleMonth).forEach(r=>{ r.status=status; if(status==='已付款') r.paid=true; });
  save(); toast(name+' 已標記為「'+status+'」'); renderTab(CURRENT_TAB);
}

  $('#panel-a-line').innerHTML=`

        ${canLineSalary?`<button class="btn btn-line btn-sm" onclick="showLine('salary')">💰 月底酬勞</button>`:''}
      </div>
      <div id="lineOut" class="result" style="margin-top:12px">點上方按鈕產生 LINE 回報文字。</div>
      <div class="btns2" style="margin-top:10px">
        <button class="btn btn-secondary btn-sm" onclick="copyText($('#lineOut').textContent)">📋 複製</button>

      </div>

function showLine(type){
  if(type==='salary' && !requirePerm('lineSalary','月底酬勞 LINE 回報限館長使用')) return;
  $('#lineOut').textContent = type==='today'?lineToday() : type==='week'?lineWeek() : lineSalary();
}
function lineToday(){
  const t=todayStr(); const list=DB.schedules.filter(s=>s.date===t&&s.status!=='取消').sort((a,b)=>a.start.localeCompare(b.start));
  let txt=`【雄麒道館｜今日排班】\n\n日期：${t.replace(/-/g,'/')}（${weekdayOf(t).slice(1)}）\n`;
  if(!list.length) txt+='\n今日無排班。';
  list.forEach(s=>{ const assist=[s.a1,s.a2,s.a3].filter(Boolean).join('、')||'—';
    txt+=`\n${s.start}–${s.end} ${s.className}\n主教練：${s.mainCoach||'—'}\n助教：${assist}\n課程：${s.content||'—'}\n`; });
  txt+='\n請教練與助教提前 10 分鐘到場。\n以禮始，以禮終。';
  return txt;
}
function lineWeek(){
  const {days}=weekRange();
  let txt='【雄麒道館｜本週教練排班】\n';
  days.forEach(d=>{ const list=DB.schedules.filter(s=>s.date===d&&s.status!=='取消').sort((a,b)=>a.start.localeCompare(b.start));
    if(!list.length) return; txt+=`\n${weekdayOf(d)}\n`;
    list.forEach(s=>{ const assist=[s.a1,s.a2,s.a3].filter(Boolean).join('、')||'—';
      txt+=`${s.start}–${s.end} ${s.className}｜主教練：${s.mainCoach||'—'}｜助教：${assist}\n`; }); });
  txt+='\n請依照排班準時到場。\n若需請假，請提前回報並協助找代班。';
  return txt;
}
function lineSalary(){
  if(!hasPerm('lineSalary')) return '此酬勞回報限館長使用。';
  const m=settleMonth||monthStr();
  const recs=DB.salaryRecords.filter(r=>r.month===m);
  const subs=DB.substituteRecords.filter(s=>monthStr(s.date)===m);
  const leaves=DB.leaveRequests.filter(l=>monthStr(l.date)===m);
  const byPerson={}; recs.forEach(r=>{(byPerson[r.personName]=byPerson[r.personName]||[]).push(r);});
  let txt=`【雄麒道館｜${+m.slice(5,7)}月教練助教酬勞結算】\n`;
  Object.keys(byPerson).forEach(n=>{ const s=personSummary(n,byPerson[n],subs,leaves);
    txt+=`\n${n}\n上課：${s.lessons}堂\n代班：${s.sub}堂\n遲到：${s.late}次\n請假：${s.leave}次\n實領：${fmtMoney(s.net)}元\n狀態：${s.paid?'已付款':'未付款'}\n`; });
  if(!Object.keys(byPerson).length) txt+='\n本月尚無酬勞資料。';
  txt+='\n若資料有誤，請於今晚前回覆。';
  return txt;
}
function lineSalaryReport(){ if(!requirePerm('lineSalary','月底酬勞 LINE 回報限館長使用')) return; switchTab('a-line'); setTimeout(()=>showLine('salary'),60); }

function exportJSON(){ if(!requirePerm('manageData','資料匯出限館長使用')) return; dl(new Blob([JSON.stringify(DB,null,2)],{type:'application/json'}), `雄麒道館備份_${todayStr()}.json`); toast('已匯出 JSON'); }
function importJSON(input){
  if(!requirePerm('manageData','資料匯入限館長使用')){ input.value=''; return; }
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ try{ const d=JSON.parse(e.target.result); DB=Object.assign(defaultDB(),d); save(); toast('✅ 匯入成功'); renderTab(CURRENT_TAB); }
    catch(err){ toast('匯入失敗：檔案格式錯誤'); } };
  r.readAsText(f); input.value='';
}
function csvCell(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function exportAllCSV(){
  if(!requirePerm('manageData','排班 CSV 匯出限館長使用')) return;
  const head=['日期','星期','班別','開始','結束','主教練','助教1','助教2','助教3','課程內容','酬勞身分','狀態','備註'];
  const rows=DB.schedules.map(s=>[s.date,s.weekday,s.className,s.start,s.end,s.mainCoach,s.a1,s.a2,s.a3,s.content,s.payRole,s.status,s.note]);
  dlCSV(head,rows,`排班_${todayStr()}.csv`);
}
function exportSalaryCSV(){
  if(!requirePerm('settleSalary','酬勞 CSV 匯出限館長使用')) return;
  const m=settleMonth||monthStr();
  const head=['日期','班別','人員','身分','基本酬勞','加給','扣款','實領','狀態','備註'];
  const rows=DB.salaryRecords.filter(r=>!settleMonth||r.month===m).map(r=>[r.date,r.className,r.personName,r.role,r.base,r.bonus,r.deduct,r.net,r.status,r.note]);
  dlCSV(head,rows,`酬勞_${settleMonth||'全部'}.csv`);
}
function dlCSV(head,rows,name){ const csv=[head,...rows].map(r=>r.map(csvCell).join(',')).join('\r\n');
  dl(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}),name); toast('已匯出 CSV'); }
function dl(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
function changePw(){ if(!requirePerm('manageData','修改館長密碼限館長使用')) return; const v=$('#newPw').value.trim(); if(!v){ toast('請輸入新密碼'); return; } DB.adminSettings.adminPw=v; save(); $('#newPw').value=''; toast('🔒 館長密碼已更新'); }
function clearAll(){ if(!requirePerm('manageData','清除所有資料限館長使用')) return; confirmBox('⚠️ 確定清除所有資料？此動作無法復原（建議先匯出備份）。',()=>{ localStorage.removeItem(KEY); DB=defaultDB(); save(); toast('已清除，回到預設'); renderTab(CURRENT_TAB); }); }

/* =========================================================
   共用：Modal / 確認 / 複製 / LINE
========================================================= */
function openModal(title, bodyHtml, buttons){
  $('#modalTitle').textContent=title; $('#modalBody').innerHTML=bodyHtml;
  const foot=$('#modalFoot'); foot.innerHTML='';
  (buttons||[]).forEach(b=>{ const el=document.createElement('button'); el.className='btn '+(b.cls||'btn-secondary'); el.textContent=b.label; el.onclick=b.fn; foot.appendChild(el); });
  $('#modal').classList.add('show');
}
function closeModal(){ $('#modal').classList.remove('show'); }
function confirmBox(msg, onYes){
  openModal('請確認', `<div class="mini" style="line-height:1.8">${esc(msg)}</div>`,
    [{label:'確定',cls:'btn-red',fn:()=>{ closeModal(); onYes(); }},{label:'取消',cls:'btn-ghost',fn:closeModal}]);
}
function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(()=>toast('已複製')).catch(()=>fallbackCopy(t)); }
  else fallbackCopy(t);
}
function fallbackCopy(t){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');toast('已複製');}catch(e){toast('複製失敗，請長按選取');} document.body.removeChild(ta); }
function shareLine(t){ copyText(t); window.open('https://line.me/R/share?text='+encodeURIComponent(t),'_blank'); }

/* 啟動 */
goHome();
initCloudSync();
