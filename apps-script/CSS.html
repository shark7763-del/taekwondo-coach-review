<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#070a12;--panel:#111827;--panel2:#172033;--input:#0d1424;--line:#29344d;
  --gold:#d4af37;--gold2:#f7de78;--text:#f8fafc;--muted:#94a3b8;--mid:#cbd5e1;
  --red:#ef4444;--green:#22c55e;--blue:#3b82f6;--orange:#f59e0b;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif}
body{background:radial-gradient(ellipse at top,rgba(212,175,55,.13),transparent 52%),linear-gradient(180deg,#090b13,#06070c)}
button,input,select,textarea{font:inherit}
.hidden{display:none!important}
.login-view{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
.brand-card{width:100%;max-width:430px;padding:24px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(155deg,rgba(17,24,39,.96),rgba(12,17,29,.98));box-shadow:0 22px 70px rgba(0,0,0,.45);text-align:center}
.logo{width:72px;height:72px;margin:0 auto 14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(135deg,#a8842a,var(--gold2));box-shadow:0 0 28px rgba(212,175,55,.34)}
.brand-en{font-size:12px;letter-spacing:5px;color:var(--gold);font-weight:900}
h1{font-size:26px;line-height:1.35;margin:8px 0 8px;letter-spacing:1px}
.brand-card p{color:var(--muted);font-size:13px;margin-bottom:18px}
.hint{margin-top:12px;color:var(--muted);font-size:12px;line-height:1.7}
.app{max-width:1080px;margin:0 auto;padding-bottom:32px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:18px 16px 12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(212,175,55,.10),transparent)}
.eyebrow{font-size:12px;color:var(--gold);font-weight:900;letter-spacing:4px}
h2{font-size:20px;margin-top:4px;letter-spacing:1px}
.user-badge{display:inline-block;margin-top:8px;padding:4px 10px;border:1px solid rgba(212,175,55,.65);border-radius:999px;color:var(--gold2);font-size:12px;background:rgba(212,175,55,.10)}
.tabs{position:sticky;top:0;z-index:20;display:flex;overflow-x:auto;background:rgba(7,10,18,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.tab-btn{flex:0 0 auto;padding:14px 16px;border:0;background:transparent;color:var(--muted);font-weight:900;white-space:nowrap;border-bottom:2px solid transparent}
.tab-btn.active{color:var(--gold2);border-bottom-color:var(--gold);background:rgba(212,175,55,.08)}
.tab-panel{padding:14px 12px}
.card{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:0 8px 26px rgba(0,0,0,.22)}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.card-title{font-size:16px;font-weight:900;color:var(--text)}
.sub{font-size:12px;color:var(--muted);line-height:1.7}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:720px){.grid,.grid3{grid-template-columns:1fr}.topbar{align-items:center}.tab-panel{padding:12px 10px}}
.field{margin-bottom:12px;text-align:left}
.field label{display:block;margin-bottom:6px;color:var(--gold2);font-size:12px;font-weight:900;letter-spacing:1px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:var(--input);color:var(--text);padding:13px 12px;outline:none}
textarea{min-height:82px;resize:vertical;line-height:1.6}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(212,175,55,.15)}
.btn{border:0;border-radius:13px;padding:13px 14px;font-weight:900;cursor:pointer;color:var(--text);background:var(--panel2)}
.btn:active{transform:scale(.985)}
.btn.wide{width:100%;margin-top:8px}
.btn.small{padding:8px 11px;font-size:12px}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#10131d}
.btn.green{background:linear-gradient(135deg,var(--green),#16a34a)}
.btn.blue{background:linear-gradient(135deg,var(--blue),#2563eb)}
.btn.red{background:linear-gradient(135deg,var(--red),#b91c1c)}
.btn.orange{background:linear-gradient(135deg,var(--orange),#d97706)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mid)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}.btn-row .btn{flex:1;min-width:110px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:var(--input);color:var(--mid);font-size:13px;font-weight:800;cursor:pointer}
.chip.active{border-color:var(--gold);background:rgba(212,175,55,.17);color:var(--gold2)}
.stars{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.star{padding:12px 0;text-align:center;border:1px solid var(--line);border-radius:12px;background:var(--input);font-weight:900;color:var(--muted);cursor:pointer}
.star.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;border-color:var(--gold2)}
.student-row{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(13,20,36,.72);margin-bottom:10px}
.result{white-space:pre-wrap;line-height:1.75;background:#060914;border:1px solid var(--line);border-radius:14px;padding:13px;color:var(--mid);font-size:13px}
.stat{background:rgba(13,20,36,.82);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat .num{font-size:28px;font-weight:1000;color:var(--gold2);line-height:1}
.stat .cap{font-size:12px;color:var(--muted);margin-top:5px}
.list{display:grid;gap:8px}
.item{border:1px solid var(--line);border-radius:13px;padding:12px;background:rgba(13,20,36,.62)}
.item-title{font-weight:900}.item-meta{font-size:12px;color:var(--muted);line-height:1.7;margin-top:4px}
.pill{display:inline-block;padding:3px 9px;border-radius:999px;border:1px solid var(--line);font-size:11px;color:var(--mid);margin-left:4px}
.pill.gold{border-color:var(--gold);color:var(--gold2);background:rgba(212,175,55,.12)}
.toast{position:fixed;left:50%;top:16px;z-index:80;transform:translateX(-50%);max-width:92vw;padding:12px 18px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;font-weight:900;opacity:0;pointer-events:none;transition:.2s}
.toast.show{opacity:1;top:22px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:70;display:flex;align-items:flex-start;justify-content:center;padding:22px;overflow:auto}
.modal-card{width:100%;max-width:520px;background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;margin:auto;box-shadow:0 20px 80px rgba(0,0,0,.55)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:16px}.x{border:0;background:transparent;color:var(--muted);font-size:24px;cursor:pointer}.modal-body{padding:16px}
</style>
